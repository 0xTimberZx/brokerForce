name: Subgraph Probe (temporary)

# TEMPORARY: spec 012 discovery probe. Confirms Uniswap-v3 subgraph deployment
# IDs + schema shape from a runner with open egress and the GRAPH_API_KEY
# secret. Deleted before the real feature PR.

# push-triggered (scoped to this feature branch) because a workflow_dispatch
# probe would only be dispatchable once its file lived on the default branch.
on:
  push:
    branches: [claude/pull-repo-wqv385]
    paths:
      - ".github/workflows/subgraph-probe.yml"
      - "scripts/subgraph-probe.mjs"

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Key presence (no value printed)
        env:
          FROM_SECRET: ${{ secrets.GRAPH_API_KEY }}
          FROM_VAR: ${{ vars.GRAPH_API_KEY }}
        run: |
          echo "secrets.GRAPH_API_KEY length: ${#FROM_SECRET}"
          echo "vars.GRAPH_API_KEY length:    ${#FROM_VAR}"
      - name: Run subgraph probe
        # Tolerate the key living as either a repo secret or a repo variable.
        env:
          GRAPH_API_KEY: ${{ secrets.GRAPH_API_KEY || vars.GRAPH_API_KEY }}
        run: node scripts/subgraph-probe.mjs
