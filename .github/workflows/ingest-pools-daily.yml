name: Daily Ingestion

# Runs the full daily data pipeline against the PERSISTENT database in the
# DATABASE_URL repo secret. It must be persistent: the active-tier gate
# (Architecture.md §5, apps/ingestion/src/tier-gate.ts) promotes a pair only
# after 7 distinct days of stored volume snapshots -- an ephemeral per-run
# database can never accumulate that evidence, so a service container here
# would silently make promotion impossible.
#
# Set the secret at: repo Settings -> Secrets and variables -> Actions ->
# New repository secret, name DATABASE_URL, value a Postgres connection
# string (Supabase / Railway / Render / Timescale Cloud all work -- the
# schema degrades gracefully where TimescaleDB isn't available, see
# packages/db/migrations/001_init.sql).

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: {}

concurrency:
  group: daily-ingestion
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Require DATABASE_URL secret
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL secret is not set. This workflow needs a PERSISTENT Postgres database -- the 7-day tier-gate evidence accumulates across runs and would be lost in an ephemeral one. See the comment at the top of this workflow file."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Order matters: assets before pairs, metrics before ORT, pool
      # ingestion before ORT so same-day tier promotions get scored.
      - name: Run daily pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          npm run migrate
          npm run ingest
          npm run generate-pairs
          npm run compute-metrics
          npm run ingest-pools
          npm run compute-ort
