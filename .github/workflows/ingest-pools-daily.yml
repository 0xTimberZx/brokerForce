name: Daily Pool Ingestion

on:
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC
  workflow_dispatch: {}

jobs:
  ingest-pools:
    runs-on: ubuntu-latest
    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: brokerforce
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migration, asset ingestion, pair generation, and pool ingestion
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/brokerforce
        run: |
          npm run migrate
          npm run ingest
          npm run generate-pairs
          npm run ingest-pools
