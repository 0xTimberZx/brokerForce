name: CI

# Mirrors docs/Product_Principles.md §4: nothing merges without traceable, working
# changes. This runs lint, typecheck, and build across every workspace — it does not
# run tests yet since no test suites exist for a pure scaffold; add a test job here
# once specs start landing real implementations with real test coverage.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  # TEMPORARY CFGI discovery -- reverted before this PR is ready. Captures the
  # real https://cfgi.io/api/v3 response shapes from the runner (the analysis
  # env's egress blocks it; runners + the CFGI_API_KEY secret work). The v3
  # host/params come from CFGI's own docs; the one unknown is the JSON body,
  # which this dumps to the log so the parser is built against evidence.
  cfgi-discovery:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Probe CFGI v3
        env:
          CFGI_API_KEY: ${{ secrets.CFGI_API_KEY }}
        run: |
          set -u
          probe () {
            local label="$1"; local url="$2"
            local safe; safe=$(echo "$url" | sed "s/${CFGI_API_KEY}/***/g")
            echo "::group::${label} -- ${safe}"
            local code
            code=$(curl -sS -m 25 -o /tmp/cfgi.out -w "%{http_code}" \
              -H "accept: application/json" \
              -H "Authorization: Bearer ${CFGI_API_KEY}" "$url" || echo "ERR")
            echo "HTTP ${code}"
            head -c 2000 /tmp/cfgi.out; echo
            echo "::endgroup::"
          }
          # 1) Asset catalogue (keyless per docs) -- confirms the symbol list shape.
          probe "assets (keyless)" "https://cfgi.io/api/v3/assets"
          # 2) Whole-market index, a few daily points -- THE shape the parser needs.
          probe "scores MARKET 1d x3 (all fields)" \
            "https://cfgi.io/api/v3/scores?api_key=${CFGI_API_KEY}&symbols=MARKET&timeframe=1d&limit=3"
          # 3) Per-token (BTC), a few daily points -- per-asset row shape + date field.
          probe "scores BTC 1d x3 (all fields)" \
            "https://cfgi.io/api/v3/scores?api_key=${CFGI_API_KEY}&symbols=BTC&timeframe=1d&limit=3"
          # 4) Multi-symbol -- is the body keyed by symbol, or a flat array?
          probe "scores BTC,ETH 1d x2" \
            "https://cfgi.io/api/v3/scores?api_key=${CFGI_API_KEY}&symbols=BTC,ETH&timeframe=1d&limit=2"
          # 5) Single latest with score field only -- the minimal documented call.
          probe "scores BTC 15m x1 fields=score" \
            "https://cfgi.io/api/v3/scores?api_key=${CFGI_API_KEY}&symbols=BTC&timeframe=15m&fields=score&limit=1"
          echo "CFGI DISCOVERY COMPLETE"
