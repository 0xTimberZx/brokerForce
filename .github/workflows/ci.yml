name: CI

# Mirrors docs/Product_Principles.md §4: nothing merges without traceable, working
# changes. This runs lint, typecheck, and build across every workspace — it does not
# run tests yet since no test suites exist for a pure scaffold; add a test job here
# once specs start landing real implementations with real test coverage.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  # TEMPORARY sentiment-source discovery -- reverted before this PR is ready.
  # Captures the real CMC + CFGI Fear&Greed response shapes from the runner
  # (the analysis env's egress blocks these APIs; runners + the repo secrets
  # work). Prints bodies to the log so parsers are built against evidence, not
  # guesses. Keys are passed via header/param and masked by Actions.
  sentiment-source-discovery:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Probe CMC and CFGI
        env:
          CMC_API_KEY: ${{ secrets.CMC_API_KEY }}
          CFGI_API_KEY: ${{ secrets.CFGI_API_KEY }}
        run: |
          set -u
          echo "::group::CMC fear-and-greed/latest"
          curl -sS -m 20 -H "X-CMC_PRO_API_KEY: ${CMC_API_KEY}" -H "accept: application/json" \
            "https://pro-api.coinmarketcap.com/v3/fear-and-greed/latest" | head -c 1200; echo
          echo "::endgroup::"
          echo "::group::CMC fear-and-greed/historical?limit=3"
          curl -sS -m 20 -H "X-CMC_PRO_API_KEY: ${CMC_API_KEY}" -H "accept: application/json" \
            "https://pro-api.coinmarketcap.com/v3/fear-and-greed/historical?limit=3" | head -c 1500; echo
          echo "::endgroup::"
          # CFGI: API shape is non-obvious -- try several documented forms and
          # dump status + body for each so the real one reveals itself.
          for url in \
            "https://api.cfgi.io/v1/index?token=BTC&period=1h&api_key=${CFGI_API_KEY}" \
            "https://api.cfgi.io/?token=BTC&api_key=${CFGI_API_KEY}" \
            "https://api.cfgi.io/index?token=ETH&api_key=${CFGI_API_KEY}" ; do
            safe=$(echo "$url" | sed "s/${CFGI_API_KEY}/***/g")
            echo "::group::CFGI ${safe}"
            code=$(curl -sS -m 20 -o /tmp/cfgi.out -w "%{http_code}" -H "accept: application/json" "$url" || echo "ERR")
            echo "HTTP ${code}"; head -c 900 /tmp/cfgi.out; echo
            echo "::endgroup::"
          done
          echo "DISCOVERY COMPLETE"
